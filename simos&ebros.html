<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>🍬 Simos ve Ebros'un Seker Topları 🍬</title>
<style>
 :root{
 --pink:#f6c5d5; --panel:#ffffffee;
 }
 *{box-sizing:border-box;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial}
 body{
 margin:0; min-height:100vh; display:grid; place-items:center;
 background: radial-gradient(1200px 700px at 30% 20%, #ffeaf2 0%, var(--pink) 60%, #f3dbe4 100%);
 }
 .app{
 width:min(560px,96vw); height:min(740px,96vh);
 border-radius:18px; overflow:hidden;
 box-shadow:0 12px 40px rgba(255,122,162,.35);
 border:1px solid rgba(255,255,255,.6);
 backdrop-filter: blur(3px);
 display:flex; flex-direction:column;
 }
 header{
 background:linear-gradient(180deg, #fff8fc 0%, #fff 100%);
 padding:10px 14px; text-align:center; font-weight:700; color:#7a3f58;
 border-bottom:1px solid #f3e5ec;
 }
 .stage{ position:relative; flex:1; background:linear-gradient(180deg,#fff 0%, #fff8fc 100%); }
 canvas{ width:100%; height:100%; display:block; }

 .controls{
 background:var(--panel); border-top:1px solid #f3e5ec;
 padding:10px; display:flex; flex-wrap:wrap; gap:10px; align-items:center;
 }
 .group{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
 .group.actions{ margin-left:auto; }

 .size{
 border-radius:999px; cursor:pointer; border:2px solid rgba(0,0,0,.08);
 background:linear-gradient(180deg,#ffffff 0%, #ffeef5 100%);
 box-shadow: inset 0 6px 10px rgba(255,255,255,.9), inset 0 -6px 12px rgba(255,122,162,.15);
 transition:transform .12s;
 }
 .size.s{ width:28px; height:28px; }
 .size.m{ width:44px; height:44px; }
 .size.l{ width:62px; height:62px; }
 .size:focus, .size:hover{ outline:3px solid #7a3f58; transform:translateY(-1px); }

 .sw{ width:36px; height:36px; border-radius:10px; cursor:pointer; border:2px solid rgba(0,0,0,.06); box-shadow:0 2px 8px rgba(0,0,0,.06) }
 .sw.on, .sw:focus{ outline:3px solid #7a3f58; }

 button{
 border:1px solid #e8c6d4; background:#fff; color:#7a3f58;
 padding:8px 12px; border-radius:999px; font-weight:700; cursor:pointer;
 box-shadow:0 4px 12px rgba(255,122,162,.12);
 }
 button:focus{ outline:3px solid #7a3f58; outline-offset:2px; }
 .pill{ background:linear-gradient(180deg,#fff,#ffeaf2); }
 .meter{ font-size:12px; color:#7a3f58; opacity:.8; padding:0 6px; }
 .sep{ width:1px; height:28px; background:#f0dbe4; }

 .badge{
 position:absolute; top:10px; right:10px; font-size:12px; color:#7a3f58; background:#fff6fb;
 padding:6px 10px; border-radius:999px; border:1px solid #f3d5e2;
 box-shadow:0 4px 10px rgba(255,122,162,.15);
 }
</style>
</head>
<body>
 <div class="app" role="application" aria-label="sima&ebrar şeker temalı top animasyonu">
 <header>🍬 Simos ve Ebros'un Seker Topları 🍬</header>

 <div class="stage">
 <span class="badge">Speed ×<span id="spd">1.00</span> • Top: <span id="cnt">0</span></span>
 <canvas id="cv"></canvas>
 </div>

 <div class="controls" aria-label="Kontrol paneli">
 <div class="group" aria-label="Boyut">
 <div class="size s" data-r="12" tabindex="0" title="Küçük"></div>
 <div class="size m" data-r="22" tabindex="0" title="Orta"></div>
 <div class="size l" data-r="34" tabindex="0" title="Büyük"></div>
 </div>

 <div class="group" aria-label="Renk">
 <!-- 8 pastel renk -->
 <div class="sw on" data-c="#ff9bbd" title="Toz pembe" tabindex="0" style="background:#ff9bbd"></div>
 <div class="sw" data-c="#b6f2d6" title="Mint" tabindex="0" style="background:#b6f2d6"></div>
 <div class="sw" data-c="#d8ccff" title="Lavanta" tabindex="0" style="background:#d8ccff"></div>
 <div class="sw" data-c="#ffd7b5" title="Şeftali" tabindex="0" style="background:#ffd7b5"></div>
 <div class="sw" data-c="#c9f0ff" title="Buz mavi" tabindex="0" style="background:#c9f0ff"></div>
 <div class="sw" data-c="#ffe0f0" title="Pembe köpük" tabindex="0" style="background:#ffe0f0"></div>
 <div class="sw" data-c="#e2ffd1" title="Soft lime" tabindex="0" style="background:#e2ffd1"></div>
 <div class="sw" data-c="#fff2b3" title="Limon" tabindex="0" style="background:#fff2b3"></div>
 </div>

 <div class="sep"></div>

 <div class="group actions" aria-label="Eylemler">
 <button id="start" class="pill">Başlat</button>
 <button id="stop" class="pill">Durdur</button>
 <button id="reset" class="pill">Sıfırla</button>
 <button id="speed" class="pill">Hızlandır</button>
 <button id="sound" class="pill" title="Ses açık/kapalı">🔊</button>
 </div>
 </div>
 </div>

<script>
(() => {
 /* === CANVAS KURULUMU === */
 const canvas = document.getElementById('cv');
 const ctx = canvas.getContext('2d', { alpha:true });

 const resize = () => {
 const r = canvas.getBoundingClientRect();
 const dpr = window.devicePixelRatio || 1;
 canvas.width = r.width * dpr;
 canvas.height = r.height * dpr;
 ctx.setTransform(dpr,0,0,dpr,0,0);
 if(!running) redrawStatic();
 };
 new ResizeObserver(resize).observe(canvas.parentElement);

 /* === DURUM === */
 const balls = []; // {x,y,dx,dy,r,color,gloss}
 let running = false, rafId = null;
 const BASE_SPEED = 2.0;
 let speedMul = 1.0;
 let currentColor = '#ff9bbd';
 let soundOn = true;

 const spdEl = document.getElementById('spd');
 const cntEl = document.getElementById('cnt');

 const rand = (a,b)=>Math.random()*(b-a)+a;

 /* === SES === */
 const AudioCtx = window.AudioContext || window.webkitAudioContext;
 const audio = new AudioCtx();

 function ping(freq=600, dur=0.06, type='sine', gain=0.12){
 if(!soundOn) return;
 const t0 = audio.currentTime;
 const osc = audio.createOscillator();
 const g = audio.createGain();
 osc.type = type;
 osc.frequency.setValueAtTime(freq, t0);
 osc.frequency.exponentialRampToValueAtTime(freq*0.65, t0+dur);
 g.gain.setValueAtTime(gain, t0);
 g.gain.exponentialRampToValueAtTime(0.0001, t0+dur);
 osc.connect(g).connect(audio.destination);
 osc.start(t0); osc.stop(t0+dur);
 }
 const clickFx = ()=>ping(2200, 0.03, 'triangle', 0.06);
 const popFx = ()=>ping(500, 0.05, 'sine', 0.09);

 /* === TOP EKLE === */
 function addBall(r){
 const W = canvas.clientWidth, H = canvas.clientHeight;
 const x = rand(r+3, W - r - 3);
 const y = rand(r+3, H - r - 3);
 const ang = rand(0, Math.PI*2);
 const v = BASE_SPEED * speedMul;
 const dx = Math.cos(ang) * v;
 const dy = Math.sin(ang) * v;

 balls.push({
 x,y,dx,dy,r,color: currentColor,
 gloss: {angle:rand(0,Math.PI*2)}
 });
 cntEl.textContent = String(balls.length);
 }

 /* === ÇİZİM === */
 function drawCandy(b){
 const grd = ctx.createRadialGradient(b.x - b.r*0.4, b.y - b.r*0.4, b.r*0.2, b.x, b.y, b.r);
 grd.addColorStop(0, '#ffffff');
 grd.addColorStop(0.25, b.color);
 grd.addColorStop(1, b.color);
 ctx.fillStyle = grd;
 ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill();

 ctx.save();
 ctx.translate(b.x, b.y);
 ctx.rotate(b.gloss.angle);
 ctx.globalAlpha = 0.35;
 ctx.fillStyle = '#fff';
 const w = b.r*1.6, h = b.r*0.55;
 ctx.beginPath();
 ctx.ellipse(-b.r*0.4, -b.r*0.25, w*0.35, h*0.35, 0, 0, Math.PI*2);
 ctx.fill();
 ctx.restore();
 }

 function fadeTrails(){
 ctx.fillStyle = 'rgba(255, 248, 252, 0.12)';
 ctx.fillRect(0,0,canvas.clientWidth,canvas.clientHeight);
 }

 /* === TOP-TOP ÇARPIŞMA (elastik, eş kütle) === */
 function resolveBallCollisions(){
 const n = balls.length;
 for(let i=0;i<n;i++){
 for(let j=i+1;j<n;j++){
 const a = balls[i], b = balls[j];
 const nx = b.x - a.x;
 const ny = b.y - a.y;
 const dist2 = nx*nx + ny*ny;
 const rSum = a.r + b.r;
 if(dist2 > 0 && dist2 < rSum*rSum){
 const dist = Math.sqrt(dist2);
 // 1) Penetrasyonu ayır (yarı yarıya)
 const overlap = rSum - dist;
 const ux = nx / dist, uy = ny / dist; // birim normal
 a.x -= ux * overlap * 0.5; a.y -= uy * overlap * 0.5;
 b.x += ux * overlap * 0.5; b.y += uy * overlap * 0.5;

 // 2) Hızları normal bileşen üzerinde değiştir (eş kütle: normal bileşenleri değiş-tokuş)
 const tax = a.dx, tay = a.dy;
 const tbx = b.dx, tby = b.dy;
 const va_n = tax*ux + tay*uy; // a'nın normal bileşeni
 const vb_n = tbx*ux + tby*uy; // b'nin normal bileşeni
 const va_t = tax - va_n*ux; // a'nın teğetsel bileşen vektörü
 const va_t_y = tay - va_n*uy;
 const vb_t = tbx - vb_n*ux; // b'nin teğetsel bileşen vektörü
 const vb_t_y = tby - vb_n*uy;

 // normal bileşenleri takas et
 const va_n_new = vb_n;
 const vb_n_new = va_n;

 a.dx = va_t + va_n_new*ux;
 a.dy = va_t_y + va_n_new*uy;
 b.dx = vb_t + vb_n_new*ux;
 b.dy = vb_t_y + vb_n_new*uy;

 popFx();
 }
 }
 }
 }

 function step(){
 fadeTrails();
 const W = canvas.clientWidth, H = canvas.clientHeight;

 // konum güncelle
 for(const b of balls){
 b.x += b.dx; b.y += b.dy;

 let hit = false;
 if(b.x - b.r <= 0){ b.x = b.r; b.dx *= -1; hit = true; }
 if(b.x + b.r >= W){ b.x = W - b.r; b.dx *= -1; hit = true; }
 if(b.y - b.r <= 0){ b.y = b.r; b.dy *= -1; hit = true; }
 if(b.y + b.r >= H){ b.y = H - b.r; b.dy *= -1; hit = true; }
 if(hit) popFx();
 }

 // top-top çarpışmaları çöz
 resolveBallCollisions();

 // çiz
 for(const b of balls) drawCandy(b);

 rafId = requestAnimationFrame(step);
 }

 function redrawStatic(){
 ctx.clearRect(0,0,canvas.clientWidth,canvas.clientHeight);
 for(const b of balls) drawCandy(b);
 }

 /* === KONTROLLER === */
 document.querySelectorAll('.size').forEach(el=>{
 const add = ()=>{ addBall(parseInt(el.dataset.r,10)); if(!running) redrawStatic(); clickFx(); };
 el.addEventListener('click', add);
 el.addEventListener('keydown', e=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); add(); } });
 });

 document.querySelectorAll('.sw').forEach(el=>{
 const pick = ()=>{
 document.querySelectorAll('.sw').forEach(x=>x.classList.remove('on'));
 el.classList.add('on');
 currentColor = el.dataset.c;
 clickFx();
 };
 el.addEventListener('click', pick);
 el.addEventListener('keydown', e=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); pick(); } });
 });

 document.getElementById('start').addEventListener('click', ()=>{
 clickFx();
 if(!running){ running = true; rafId = requestAnimationFrame(step); }
 });
 document.getElementById('stop').addEventListener('click', ()=>{
 clickFx();
 running = false; cancelAnimationFrame(rafId); redrawStatic();
 });
 document.getElementById('reset').addEventListener('click', ()=>{
 clickFx();
 balls.length = 0; speedMul = 1.0; spdEl.textContent = '1.00';
 running = false; cancelAnimationFrame(rafId);
 redrawStatic(); cntEl.textContent = '0';
 });
 document.getElementById('speed').addEventListener('click', ()=>{
 clickFx();
 const f = 1.20; speedMul *= f;
 balls.forEach(b=>{ b.dx*=f; b.dy*=f; });
 spdEl.textContent = String(speedMul.toFixed(2));
 });

 document.getElementById('sound').addEventListener('click', ()=>{
 soundOn = !soundOn; clickFx();
 const btn = document.getElementById('sound');
 btn.textContent = soundOn ? '🔊' : '🔈';
 if(audio.state === 'suspended') audio.resume();
 });

 window.addEventListener('keydown', e=>{
 if(e.target.closest('input,button,[tabindex]')) return;
 if(e.key.toLowerCase()==='s') document.getElementById('start').click();
 if(e.key.toLowerCase()==='p') document.getElementById('stop').click();
 if(e.key.toLowerCase()==='r') document.getElementById('reset').click();
 if(e.key==='+' || e.key==='=') document.getElementById('speed').click();
 if(e.key.toLowerCase()==='m') document.getElementById('sound').click();
 });

 resize();
})();
</script>
<script src="test-sugar-balls.js"></script>
</body>
</html>
